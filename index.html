<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestellApp</title>
</head>

<body>
    <header>
        <nav>
            <img src="#" alt="logo-1">
            <div>Burger Menü</div>
        </nav>
    </header>
    <main>
        <hero>
            <img src="#" alt="background">
            <div>
                <img src="#" alt="logo-2">
                <div>
                    <h1>Sakura Sushi</h1>
                    <div>
                        <img src="#" alt="stern">
                        <p>4,1</p>
                        <p>(317)</p>
                    </div>
                </div>
                <p>Discription</p>
            </div>
        </hero>
        <aside>
            <div>
                <h3>Your Basket</h3>
                <div>Menu</div>
                <div>
                    <p>Subtotal</p>
                    <p>36,70 Euro</p>
                </div>
                <div>
                    <p>Delivery fee</p>

                </div>
                <div>
                    <b>Total</b>

                </div>
            </div>
        </aside>
        <div>
            <div>
                <h2>Category Name</h2>
                <div>
                    <div>
                        <img src="#" alt="menu-img">
                    </div>
                    <div>
                        <h4>Menu Name</h4>
                        <p>Discription</p>
                    </div>
                    <div>
                        <h4>Price</h4>
                        <button>Add to Basket</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div>
            <img src="#" alt="copyright">
            <p>2026 Sakura Sushi</p>
        </div>
        <a href="#">Imprint</a>
        <a href="#">Cookie Preferences</a>

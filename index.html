<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestellApp</title>
    <link href="style.css" rel="stylesheet">
    <script src="script.js"></script>
</head>

<body>
    <header>
        <nav>
            <img src="./assets/icons/logo-1.png" alt="logo-1">
            <div>Burger Menü</div>
        </nav>
    </header>
    <hero class="hero-section">
        <div class="hero-content">
            <img src="#" alt="logo-2">
            <div class="hero-headline">
                <h1>Sakura Sushi</h1>
                <div class="hero-text">
                    <img src="#" alt="stern">
                    <p>4,1</p>
                    <p>(317)</p>
                </div>
            </div>
            <p>Discription</p>
        </div>
    </hero>
    <main>
        <section class="main-content">
            <article>
                <h2>Category Name</h2>
            </article>
            <div class="menu-card">
                <div class="menu-card-img">
                    <img src="#" alt="menu-img">
                </div>
                <div class="menu-card-text">
                    <h4>Menu Name</h4>
                    <p>Discription</p>
                </div>
                <div class="menu-card-buy">
                    <h4>Price</h4>
                    <button>Add to Basket</button>
                </div>
            </div>
        </section>
        <div class="basket-sticky">
            <h3>Your Basket</h3>
            <div class="basket-menu-card">
                <p></p>
                <p>Menuname</p>
            </div>
            <div class="basket-summary">
                <p>Subtotal</p>
                <p>36,70 Euro</p>
            </div>
            <div>
                <p>Delivery fee</p>
                <p>4,99 Euro</p>
            </div>
            <div>
                <b>Total</b>
                <b>41,69 Euro</b>
            </div>
        </div>
    </main>
    <footer>
        <div class="footer-copyright">
            <img src="#" alt="copyright">
            <p>2026 Sakura Sushi</p>
        </div>
        <a href="#">Imprint</a>
        <a href="#">Cookie Preferences</a>
    </footer>
</body>

</html>
